<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    background:white;
    padding:20px;
    width:420px;
    border-radius:10px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.3);
}

h2,h3{
    text-align:center;
}

.input-box{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:10px;
    font-size:16px;
}

button{
    padding:10px;
    border:none;
    cursor:pointer;
    color:white;
    border-radius:5px;
    margin-left:2px;
}

button:hover{
    opacity:0.8;
}

.add{
    background:blue;
}

.edit-btn{
    background:orange;
}

.delete-btn{
    background:red;
}

.clear{
    background:black;
}

.search{
    margin-top:10px;
    width:95%;
}

ul{
    list-style:none;
    padding:0;
}

li{
    background:#eee;
    margin-top:10px;
    padding:10px;
    border-radius:5px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.completed{
    text-decoration:line-through;
    color:gray;
}

.bottom{
    text-align:center;
    margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

<h2>To-Do List</h2>

<div class="input-box">

<input
type="text"
id="taskInput"
placeholder="Enter Task"
onkeypress="if(event.key=='Enter') addTask()">

<button class="add" onclick="addTask()">Add</button>

</div>

<br>

<input
class="search"
type="text"
id="search"
placeholder="Search Task"
onkeyup="searchTask()">

<ul id="taskList"></ul>

<h3>Total Tasks :
<span id="count">0</span>
</h3>

<h3>Completed :
<span id="completedCount">0</span>
</h3>

<div class="bottom">

<button class="clear"
onclick="clearAll()">
Clear All
</button>

</div>

</div>

<script>

window.onload=function(){

    let data=localStorage.getItem("tasks");

    if(data){
        document.getElementById("taskList").innerHTML=data;

        restoreEvents();
    }

    updateCount();
    updateCompletedCount();
}

function saveData(){

    localStorage.setItem(
    "tasks",
    document.getElementById("taskList").innerHTML
    );
}

function updateCount(){

    document.getElementById("count").innerText=
    document.getElementById("taskList").children.length;

}

function updateCompletedCount(){

    document.getElementById("completedCount").innerText=
    document.getElementsByClassName("completed").length;

}

function addTask(){

    let input=document.getElementById("taskInput");

    let task=input.value.trim();

    if(task==""){
        alert("Enter Task");
        return;
    }

    let li=document.createElement("li");

    let span=document.createElement("span");

    let time=new Date();

    span.innerText=
    task+" ("+time.toLocaleString()+")";

    span.onclick=function(){

        span.classList.toggle("completed");

        updateCompletedCount();

        saveData();

    };

    let div=document.createElement("div");

    let edit=document.createElement("button");

    edit.innerText="Edit";

    edit.className="edit-btn";

    edit.onclick=function(){

        let txt=prompt(
        "Edit Task",
        span.innerText
        );

        if(txt!=null && txt.trim()!=""){

            span.innerText=txt;

            saveData();

        }

    };

    let del=document.createElement("button");

    del.innerText="Delete";

    del.className="delete-btn";

    del.onclick=function(){

        li.remove();

        updateCount();

        updateCompletedCount();

        saveData();

    };

    div.appendChild(edit);

    div.appendChild(del);

    li.appendChild(span);

    li.appendChild(div);

    document.getElementById("taskList")
    .appendChild(li);

    input.value="";

    updateCount();

    updateCompletedCount();

    saveData();

}

function clearAll(){

    document.getElementById("taskList")
    .innerHTML="";

    updateCount();

    updateCompletedCount();

    saveData();

}

function searchTask(){

    let value=document.getElementById("search")
    .value.toLowerCase();

    let li=document.getElementById("taskList")
    .getElementsByTagName("li");

    for(let i=0;i<li.length;i++){

        let txt=
        li[i].firstChild.innerText.toLowerCase();

        if(txt.indexOf(value)>-1){

            li[i].style.display="";

        }

        else{

            li[i].style.display="none";

        }

    }

}

function restoreEvents(){

    let li=document.querySelectorAll("#taskList li");

    li.forEach(function(item){

        let span=item.querySelector("span");

        span.onclick=function(){

            span.classList.toggle("completed");

            updateCompletedCount();

            saveData();

        };

        let btn=item.querySelectorAll("button");

        btn[0].onclick=function(){

            let txt=prompt(
            "Edit Task",
            span.innerText
            );

            if(txt!=null && txt.trim()!=""){

                span.innerText=txt;

                saveData();

            }

        };

        btn[1].onclick=function(){

            item.remove();

            updateCount();

            updateCompletedCount();

            saveData();

        };

    });

}

</script>

</body>
</html>
